<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon carnet culturel - Accueil</title>
    
    <!-- Utilisation de Tailwind CSS pour un design moderne et responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importation de polices Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Personnalisation des polices */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Fond sombre élégant */
        }
        h1, h2 {
            font-family: 'Playfair Display', serif;
        }
        
        /* Animation d'apparition des cartes */
        .card-enter {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col relative overflow-x-hidden selection:bg-indigo-500 selection:text-white">

    <!-- Décoration d'arrière-plan (Taches de couleur floues globales) -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-30"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-30"></div>
        <div class="absolute top-[40%] left-[50%] transform -translate-x-1/2 w-[800px] h-[800px] bg-blue-900 rounded-full mix-blend-multiply filter blur-[150px] opacity-20"></div>
    </div>

    <!-- En-tête -->
    <header class="pt-20 pb-16 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 drop-shadow-sm">
            Mon carnet culturel
        </h1>
        <p class="text-lg md:text-2xl text-gray-300 font-light tracking-[0.2em] uppercase">
            Sommaire des galeries
        </p>
    </header>

    <!-- Menu principal (Grille de navigation) -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 w-full pb-20">
        
        <!-- Grille : 1 colonne sur mobile, 2 sur tablette/PC -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10">
            
            <!-- Carte 1 : Bibliothèque -->
            <a href="bibli/index.html" class="card-enter delay-1 group relative block overflow-hidden rounded-3xl aspect-[4/3] shadow-2xl transition-all duration-500 hover:scale-[1.03] hover:shadow-pink-500/20">
                <!-- Dégradé de fond -->
                <div class="absolute inset-0 bg-gradient-to-br from-purple-800 to-pink-600 opacity-90 group-hover:opacity-100 transition-opacity duration-500"></div>
                <!-- Motif décoratif (optionnel, donne de la texture) -->
                <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                
                <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-10">
                    <h2 class="text-4xl md:text-5xl font-bold mb-4 group-hover:transform group-hover:-translate-y-2 transition-transform duration-500">Bibliothèque</h2>
                    <span class="inline-block px-6 py-2 border border-white/30 rounded-full text-sm uppercase tracking-widest bg-white/5 backdrop-blur-sm group-hover:bg-white/20 transition-colors duration-300">
                        Explorer
                    </span>
                </div>
            </a>

            <!-- Carte 2 : Van Gogh -->
            <a href="vangogh/index.html" class="card-enter delay-2 group relative block overflow-hidden rounded-3xl aspect-[4/3] shadow-2xl transition-all duration-500 hover:scale-[1.03] hover:shadow-blue-500/20">
                <div class="absolute inset-0 bg-gradient-to-br from-blue-900 via-blue-700 to-yellow-600 opacity-90 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                
                <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-10">
                    <h2 class="text-4xl md:text-5xl font-bold mb-4 group-hover:transform group-hover:-translate-y-2 transition-transform duration-500">Vincent Van Gogh</h2>
                    <span class="inline-block px-6 py-2 border border-white/30 rounded-full text-sm uppercase tracking-widest bg-white/5 backdrop-blur-sm group-hover:bg-white/20 transition-colors duration-300">
                        Explorer
                    </span>
                </div>
            </a>

            <!-- Carte 3 : Héléween -->
            <a href="heleween/index.html" class="card-enter delay-3 group relative block overflow-hidden rounded-3xl aspect-[4/3] shadow-2xl transition-all duration-500 hover:scale-[1.03] hover:shadow-orange-500/20">
                <div class="absolute inset-0 bg-gradient-to-br from-purple-900 to-orange-600 opacity-90 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                
                <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-10">
                    <h2 class="text-4xl md:text-5xl font-bold mb-4 group-hover:transform group-hover:-translate-y-2 transition-transform duration-500">Héléween</h2>
                    <span class="inline-block px-6 py-2 border border-white/30 rounded-full text-sm uppercase tracking-widest bg-white/5 backdrop-blur-sm group-hover:bg-white/20 transition-colors duration-300">
                        Explorer
                    </span>
                </div>
            </a>

            <!-- Carte 4 : Cinéma -->
            <a href="cinema/index.html" class="card-enter delay-4 group relative block overflow-hidden rounded-3xl aspect-[4/3] shadow-2xl transition-all duration-500 hover:scale-[1.03] hover:shadow-red-500/20">
                <div class="absolute inset-0 bg-gradient-to-br from-red-800 via-red-600 to-yellow-600 opacity-90 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                
                <div class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center z-10">
                    <h2 class="text-4xl md:text-5xl font-bold mb-4 group-hover:transform group-hover:-translate-y-2 transition-transform duration-500 text-shadow">Cinéma</h2>
                    <p class="text-lg mb-6 font-light opacity-90">Les variétés</p>
                    <span class="inline-block px-6 py-2 border border-white/30 rounded-full text-sm uppercase tracking-widest bg-white/5 backdrop-blur-sm group-hover:bg-white/20 transition-colors duration-300">
                        Explorer
                    </span>
                </div>
            </a>

        </div>
    </main>

    <footer class="mt-auto py-6 text-center text-gray-500 text-sm">
        <p>&copy; Mon carnet culturel</p>
    </footer>

</body>
</html>
