<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon carnet culturel - Cléopâtre Superstar</title>
    
    <!-- Utilisation de Tailwind CSS pour un design moderne et responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importation de polices Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Personnalisation des polices */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Fond sombre élégant */
        }
        h1 {
            font-family: 'Playfair Display', serif;
        }
        
        /* Animation de la galerie */
        .gallery-item {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Délais d'animation pour chaque élément */
        .delay-1 { animation-delay: 0.1s; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col relative overflow-x-hidden selection:bg-yellow-500 selection:text-white">

    <!-- Bouton Retour à l'accueil intégré -->
    <a href="../index.html" class="absolute top-4 left-4 sm:top-6 sm:left-6 z-40 flex items-center gap-2 px-4 py-2 bg-gray-900/40 hover:bg-gray-900/80 backdrop-blur-md border border-white/10 rounded-full text-white transition-all duration-300 group shadow-lg">
        <svg class="w-5 h-5 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        <span class="text-sm font-medium tracking-wider uppercase hidden sm:block">Accueil</span>
    </a>

    <!-- Décoration d'arrière-plan (Thème Or et Bleu Lapis-lazuli) -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-800 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-yellow-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>
    </div>

    <!-- En-tête -->
    <header class="pt-24 pb-12 px-6 text-center">
        <h1 class="text-5xl md:text-7xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-500 to-blue-400 drop-shadow-sm">
            Mon carnet culturel
        </h1>
        <p class="text-lg md:text-2xl text-gray-300 font-light tracking-[0.2em] uppercase">
            Cléopatre Superstar
        </p>
    </header>

    <!-- Conteneur principal de la galerie -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full pb-20">
        
        <!-- Grille CSS : 1 colonne sur mobile, 2 sur tablette, 3 sur PC -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            
            <!-- Élément 1 (Vidéo) -->
            <div class="gallery-item delay-1 group relative aspect-square overflow-hidden rounded-2xl shadow-xl bg-gray-800 cursor-pointer border border-yellow-500/10 hover:border-yellow-500/40 transition-colors" onclick="openMedia('images (1).mp4', 'video')">
                <video src="images (1).mp4" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" muted loop autoplay playsinline></video>
                <!-- Icône vidéo -->
                <div class="absolute top-4 right-4 bg-black/60 p-2 rounded-full backdrop-blur-sm">
                    <svg class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM14.553 7.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"></path></svg>
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-gray-900/90 via-gray-900/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-6">
                    <span class="text-white font-medium text-lg border-b-2 border-yellow-500 pb-1">images (1).mp4</span>
                </div>
            </div>

        </div>
    </main>

    <!-- Modale / Lightbox combinée -->
    <div id="lightbox" class="fixed inset-0 z-50 bg-black/95 hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        
        <!-- Bouton fermer -->
        <button onclick="closeLightbox()" class="absolute top-6 right-6 z-50 text-gray-400 hover:text-white transition-colors p-2 bg-gray-900/50 rounded-full">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
        
        <!-- Conteneurs dynamiques pour l'affichage plein écran -->
        <div id="media-container" class="relative max-w-full max-h-[85vh] flex items-center justify-center transform scale-95 transition-transform duration-300">
            <!-- Image -->
            <img id="lightbox-img" src="" alt="Média en plein écran" class="hidden max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl">
            <!-- Vidéo -->
            <video id="lightbox-video" src="" controls class="hidden max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl"></video>
        </div>
        
        <!-- Titre sous le média dans la lightbox -->
        <div id="lightbox-caption" class="mt-4 text-yellow-500 text-lg font-medium tracking-wide"></div>
    </div>

    <!-- Scripts pour l'interactivité -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxVideo = document.getElementById('lightbox-video');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const mediaContainer = document.getElementById('media-container');

        // Générer une image de remplacement en cas d'erreur
        function fallbackMedia(imgElement, filename) {
            imgElement.onerror = null;
            imgElement.src = `https://placehold.co/800x800/1e293b/eab308?text=${encodeURIComponent(filename)}`;
        }

        // Ouvrir la Lightbox
        function openMedia(src, type) {
            lightboxCaption.textContent = src;
            lightbox.classList.remove('hidden');

            lightboxImg.classList.add('hidden');
            lightboxVideo.classList.add('hidden');
            lightboxVideo.pause();

            if (type === 'image') {
                lightboxImg.src = src;
                lightboxImg.classList.remove('hidden');
                lightboxImg.onerror = function() { fallbackMedia(this, src); };
            } else if (type === 'video') {
                lightboxVideo.src = src;
                lightboxVideo.classList.remove('hidden');
                lightboxVideo.play();
            }
            
            setTimeout(() => {
                lightbox.classList.remove('opacity-0');
                mediaContainer.classList.remove('scale-95');
                mediaContainer.classList.add('scale-100');
            }, 10);
            
            document.body.style.overflow = 'hidden';
        }

        // Fermer la Lightbox
        function closeLightbox() {
            lightbox.classList.add('opacity-0');
            mediaContainer.classList.remove('scale-100');
            mediaContainer.classList.add('scale-95');
            
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightboxVideo.pause();
                lightboxVideo.src = "";
                document.body.style.overflow = 'auto';
            }, 300);
        }

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target === mediaContainer) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
